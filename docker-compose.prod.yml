# ============================================================
# PRODUCTION - runs on the VPS (Oracle Cloud)
# ============================================================

services:
  api:
    image: ghcr.io/eminrams/clinic-software:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel run
    env_file:
      - .env
    depends_on:
      - api

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  backup:
    image: ghcr.io/eminrams/clinic-software-backup:latest
    restart: unless-stopped
    depends_on:
      - db
    env_file:
      - .env
    environment:
      PGHOST: db
      PGUSER: $POSTGRES_USER
      PGPASSWORD: $POSTGRES_PASSWORD
      PGDATABASE: $POSTGRES_DB
      AWS_ACCESS_KEY_ID: $R2_ACCESS_KEY_ID
      AWS_SECRET_ACCESS_KEY: $R2_SECRET_ACCESS_KEY
      AWS_DEFAULT_REGION: auto
    volumes:
      - ./backups:/backups

volumes:
  pgdata:
