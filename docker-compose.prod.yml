# ============================================================
# PRODUCTION - runs on the VPS (DigitalOcean/Vultr)
# Self-hosted Postgres from day one (no Neon). No ports are
# published to the public internet - Cloudflare Tunnel handles
# all inbound traffic, and backups are pushed to Cloudflare R2.
# ============================================================
version: "3.9"

services:
  api:
    image: ghcr.io/YOUR_GITHUB_USER/clinic-software:latest
    restart: unless-stopped
    # NOTE: no "ports:" mapping here on purpose. cloudflared reaches
    # this container over the internal Docker network (service name "api"),
    # so nothing needs to be exposed to the host or the public internet.
    env_file:
      - .env.production
    depends_on:
      db:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - api
    # Configure the tunnel's public hostname -> http://api:3000 mapping
    # from the Cloudflare Zero Trust dashboard (Networks > Tunnels).
    # No firewall rules needed on the VPS at all for inbound web traffic.

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clinic_user -d clinic_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    # NOTE: not exposing 5432 to the public internet in production.
    # Connect only from the "api" service on the internal Docker network,
    # or via SSH tunnel if you need to inspect data manually.

  # Nightly backup: dumps the database, keeps 30 days locally,
  # AND pushes a copy off-server to Cloudflare R2 (S3-compatible API).
  backup:
    build: ./backup
    restart: unless-stopped
    depends_on:
      - db
    environment:
      PGHOST: db
      PGUSER: ${POSTGRES_USER}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      PGDATABASE: ${POSTGRES_DB}
      AWS_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
      AWS_DEFAULT_REGION: auto
      R2_ENDPOINT: ${R2_ENDPOINT}       # e.g. https://<account_id>.r2.cloudflarestorage.com
      R2_BUCKET: ${R2_BUCKET}           # e.g. clinic-software-backups
    volumes:
      - ./backups:/backups

volumes:
  pgdata:
