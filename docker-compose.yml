# ============================================================
# LOCAL DEVELOPMENT - docker compose up
# Runs the API with hot-reload + a local Postgres so you don't
# need to touch Neon at all while coding day to day.
# ============================================================
version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.dev   # dev-only Dockerfile with hot reload (see below)
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    volumes:
      - ./:/app          # mount source so changes reflect instantly
      - /app/node_modules # keep container's node_modules, don't overwrite from host
    depends_on:
      db:
        condition: service_healthy
    command: npm run start:dev

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"       # exposed so you can inspect with a GUI client if needed
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./clinic_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      # ^ auto-runs the schema file the first time the container is created
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
