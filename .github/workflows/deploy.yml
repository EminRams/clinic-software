name: Build and Deploy

on:
  push:
    branches: [main]

env:
  IMAGE_NAME: ghcr.io/eminrams/clinic-software
  BACKUP_IMAGE_NAME: ghcr.io/eminrams/clinic-software-backup

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --ci

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Build and push backup image
        uses: docker/build-push-action@v5
        with:
          context: ./backup
          file: ./backup/Dockerfile
          push: true
          tags: |
            ${{ env.BACKUP_IMAGE_NAME }}:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH key
        env:
          SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Copy docker-compose.prod.yml to VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no docker-compose.prod.yml "${VPS_USER}@${VPS_HOST}:/opt/clinic-software/docker-compose.prod.yml"

      - name: Create .env on VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          PRODUCTION_ENV: ${{ secrets.PRODUCTION_ENV }}
        run: |
          echo "$PRODUCTION_ENV" > .env
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no .env "${VPS_USER}@${VPS_HOST}:/opt/clinic-software/.env"
          rm .env

      - name: Deploy to VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          GHCR_TOKEN: ${{ secrets.GHCR_READ_TOKEN }}
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no "${VPS_USER}@${VPS_HOST}" << 'DEPLOY_EOF'
            echo "=== Validating deployment directory and .env ==="
            if [ -f /opt/clinic-software/.env ]; then
              echo ".env file successfully configured on VPS."
            else
              echo "ERROR: .env file is missing on VPS!"
              exit 1
            fi
            echo "$GHCR_TOKEN" | docker login ghcr.io -u eminrams --password-stdin
            cd /opt/clinic-software
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
            sleep 5
            echo "=== Service Status ==="
            docker compose -f docker-compose.prod.yml ps
            echo "=== Container logs ==="
            docker compose -f docker-compose.prod.yml logs api --tail=50
          DEPLOY_EOF
