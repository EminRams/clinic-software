name: Build and Deploy

on:
  push:
    branches: [main]

env:
  IMAGE_NAME: ghcr.io/eminrams/clinic-software
  BACKUP_IMAGE_NAME: ghcr.io/eminrams/clinic-software-backup

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --ci

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Build and push backup image
        uses: docker/build-push-action@v5
        with:
          context: ./backup
          file: ./backup/Dockerfile
          push: true
          tags: |
            ${{ env.BACKUP_IMAGE_NAME }}:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH key
        env:
          SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Copy docker-compose.prod.yml to VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no docker-compose.prod.yml "${VPS_USER}@${VPS_HOST}:/opt/clinic-software/docker-compose.prod.yml"

      - name: Create .env on VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          POSTGRES_USER: ${{ vars.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ vars.POSTGRES_DB }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_EXPIRES_IN: ${{ vars.JWT_EXPIRES_IN }}
          ADMIN_EMAIL: ${{ vars.ADMIN_EMAIL }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          CLOUDFLARE_TUNNEL_TOKEN: ${{ secrets.CLOUDFLARE_TUNNEL_TOKEN }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ vars.R2_ENDPOINT }}
          R2_BUCKET: ${{ vars.R2_BUCKET }}
        run: |
          {
            printf "POSTGRES_USER=%s\n" "$POSTGRES_USER"
            printf "POSTGRES_PASSWORD=%s\n" "$POSTGRES_PASSWORD"
            printf "POSTGRES_DB=%s\n" "$POSTGRES_DB"
            printf "DATABASE_URL=postgresql://%s:%s@db:5432/%s\n" "$POSTGRES_USER" "$POSTGRES_PASSWORD" "$POSTGRES_DB"
            printf "JWT_SECRET=%s\n" "$JWT_SECRET"
            printf "JWT_EXPIRES_IN=%s\n" "$JWT_EXPIRES_IN"
            printf "ADMIN_EMAIL=%s\n" "$ADMIN_EMAIL"
            printf "ADMIN_PASSWORD=%s\n" "$ADMIN_PASSWORD"
            printf "PORT=3000\n"
            printf "NODE_ENV=production\n"
            printf "TUNNEL_TOKEN=%s\n" "$CLOUDFLARE_TUNNEL_TOKEN"
            printf "R2_ACCESS_KEY_ID=%s\n" "$R2_ACCESS_KEY_ID"
            printf "R2_SECRET_ACCESS_KEY=%s\n" "$R2_SECRET_ACCESS_KEY"
            printf "R2_ENDPOINT=%s\n" "$R2_ENDPOINT"
            printf "R2_BUCKET=%s\n" "$R2_BUCKET"
          } > .env
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no .env "${VPS_USER}@${VPS_HOST}:/opt/clinic-software/.env"
          rm .env

      - name: Deploy to VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          GHCR_TOKEN: ${{ secrets.GHCR_READ_TOKEN }}
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no "${VPS_USER}@${VPS_HOST}" << DEPLOY_EOF
            echo "$GHCR_TOKEN" | docker login ghcr.io -u eminrams --password-stdin
            cd /opt/clinic-software
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
            sleep 5
            echo "=== Service Status ==="
            docker compose -f docker-compose.prod.yml ps
            echo "=== Container logs ==="
            docker compose -f docker-compose.prod.yml logs api --tail=50
          DEPLOY_EOF
